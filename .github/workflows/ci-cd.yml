name: CI/CD — SpendWisely

# Triggers on push/PR to main or develop
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

# Prevent overlapping runs
concurrency:
  group: spendwisely-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

# ─────────────────────────────────────────────────────────────
# JOBS DEFINITION
# ─────────────────────────────────────────────────────────────
jobs:
  # ── JOB 1: Backend Lint & Typecheck ───────────────────────
  lint-and-typecheck-api:
    name: "API: Lint & Typecheck"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint API
        run: pnpm --filter @spendwisely/api lint

      - name: Type check — API
        run: pnpm --filter @spendwisely/api typecheck

  # ── JOB 2: Frontend Lint & Build Check ────────────────────
  lint-and-typecheck-web:
    name: "Web: Lint & Build Check"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Check — Web (Production Build)
        run: pnpm --filter @spendwisely/web build

  # ── JOB 3: Backend Tests (with Live Redis & RabbitMQ) ─────
  test-api:
    name: "API: Integration Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-and-typecheck-api
    services:
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

      rabbitmq:
        image: rabbitmq:3.13-alpine
        ports:
          - 5672:5672
        env:
          RABBITMQ_DEFAULT_USER: spendwisely
          RABBITMQ_DEFAULT_PASS: test_password
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      PORT: 3000
      FRONTEND_URL: http://localhost:5173
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      REDIS_URL: redis://localhost:6379
      RABBITMQ_URL: amqp://spendwisely:test_password@localhost:5672
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
      ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
      GOOGLE_CLIENT_ID: placeholder
      GOOGLE_CLIENT_SECRET: placeholder
      GOOGLE_CALLBACK_URL: http://localhost:3000/api/v1/auth/gmail/callback
      ARKESEL_API_KEY: placeholder
      ARKESEL_SENDER_ID: SpendWisely

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run API tests
        run: pnpm --filter @spendwisely/api test --if-present

  # ── JOB 4: Frontend Tests ──────────────────────────────────
  test-web:
    name: "Web: Frontend Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint-and-typecheck-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Web tests
        run: pnpm --filter @spendwisely/web test --if-present

  # ── JOB 5: Run DB Migrations (only on push to main) ───────
  migrate:
    name: "DB: Run Supabase Migrations"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test-api, test-web]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run migrations on production database
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          ENCODED_PASSWORD=$(echo -n "$DB_PASSWORD" | jq -s -R -r @uri)
          supabase migration up --db-url "postgresql://postgres.$PROJECT_REF:$ENCODED_PASSWORD@aws-1-us-east-1.pooler.supabase.com:5432/postgres"

  # ── JOB 6: Deploy API Server (only on push to main) ────────
  deploy-api:
    name: Deploy API → Render
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: migrate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render API Deploy Hook
        run: |
          curl --fail --silent --show-error -X POST "${{ secrets.RENDER_DEPLOY_HOOK_API }}"

  # ── JOB 7: Deploy Worker (only on push to main) ───────────
  deploy-worker:
    name: Deploy Worker → Render
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: migrate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render Worker Deploy Hook
        run: |
          curl --fail --silent --show-error -X POST "${{ secrets.RENDER_DEPLOY_HOOK_WORKER }}"

  # ── JOB 8: Deploy Frontend (only on push to main) ──────────
  deploy-web:
    name: Deploy Web → Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: migrate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
