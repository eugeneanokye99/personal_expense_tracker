version: '3.9'

# Local development services.
# Supabase DB is remote (cloud). Only Redis and RabbitMQ run locally.
# Run: docker compose up -d

services:
  redis:
    image: redis:7.2-alpine
    container_name: spendwisely-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: spendwisely-rabbitmq
    ports:
      - '5672:5672'    # AMQP protocol
      - '15672:15672'  # Management UI → http://localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: spendwisely
      RABBITMQ_DEFAULT_PASS: dev_password
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
  rabbitmq_data:

# ─────────────────────────────────────────────────────────────
# Usage:
#   Start services:   docker compose up -d
#   Stop services:    docker compose down
#   View logs:        docker compose logs -f
#   RabbitMQ UI:      http://localhost:15672 (user: spendwisely, pass: dev_password)
#   Redis CLI:        docker exec -it spendwisely-redis redis-cli
# ─────────────────────────────────────────────────────────────
